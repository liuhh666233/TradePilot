name: CI

on:
  push:
  pull_request:

jobs:
  python-format:
    name: Python format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install format tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit

      - name: Run Black check via pre-commit
        run: pre-commit run black --all-files

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Python tests
        id: detect-tests
        run: |
          if git ls-files 'test*.py' '**/test*.py' | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No Python tests found; skipping unittest discovery."
          fi

      - name: Set up Python
        if: steps.detect-tests.outputs.has_tests == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        if: steps.detect-tests.outputs.has_tests == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pandas numpy polars matplotlib pydantic loguru pyarrow duckdb \
            click pyyaml pendulum rich akshare tushare apscheduler fastapi uvicorn

      - name: Run unittest discovery
        if: steps.detect-tests.outputs.has_tests == 'true'
        run: python -m unittest discover

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: webapp/yarn.lock

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn build
